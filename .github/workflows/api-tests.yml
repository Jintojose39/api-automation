name: API Automation Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  run-api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        run: npm install

      - name: Install Newman and Reporter
        run: npm install newman newman-reporter-htmlextra

      - name: Run API Tests with Newman
        run: |
          mkdir -p reports
          npx newman run GroceryStore.collection.json \
          -e Grocery.environment.json \
          -r cli,htmlextra,junit \
          --reporter-htmlextra-export reports/report.html \
          --reporter-junit-export reports/results.xml

      - name: List generated files
        run: ls -R

      - name: Upload HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: newman-html-report
          path: reports/report.html

      - name: Upload JUnit Report
        uses: actions/upload-artifact@v4
        with:
          name: newman-junit-report
          path: reports/results.xml